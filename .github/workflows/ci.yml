name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22.22.0"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PINECONE_API_KEY: "test"
      PINECONE_INDEX_NAME: "test"
      DOCUMENT_VECTOR_NAMESPACE: "bookstack"
      BOOKSTACK_URL: "http://localhost"
      BOOKSTACK_TOKEN_ID: "test"
      BOOKSTACK_TOKEN_SECRET: "test"
      BOOKSTACK_SOURCE_KEY: "bookstack_default"
      BOOKSTACK_SOURCE_NAME: "BookStack"
      POSTGRES_DB: "test_db"
      POSTGRES_USER: "test_user"
      POSTGRES_PASSWORD: "test_password"
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"
      JWT_SECRET_KEY: "test-secret-key-for-ci-only-not-for-production"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com/"
      AZURE_OPENAI_API_KEY: "test-azure-key"
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "text-embedding-3-large"
      AZURE_OPENAI_CHAT_DEPLOYMENT: "gpt-4"
      AZURE_OPENAI_API_VERSION: "2024-02-01"
      AZURE_OPENAI_AUTH_MODE: "api_key"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      NEXT_TELEMETRY_DISABLED: "1"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Show Node.js versions
        run: |
          node -v
          npm -v

      - name: Prepare CI environment
        run: cp .env.example .env.local

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:smoke -- --maxWorkers=1

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cleo-backend ./backend

      - name: Build frontend image
        run: docker build -t cleo-frontend ./frontend
