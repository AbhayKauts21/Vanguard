name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Backend ----
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -q
        env:
          # Provide dummy env vars so Settings doesn't crash on import
          PINECONE_API_KEY: "test"
          PINECONE_INDEX_NAME: "test"
          DOCUMENT_VECTOR_NAMESPACE: "bookstack"
          BOOKSTACK_URL: "http://localhost"
          BOOKSTACK_TOKEN_ID: "test"
          BOOKSTACK_TOKEN_SECRET: "test"
          BOOKSTACK_SOURCE_KEY: "bookstack_default"
          BOOKSTACK_SOURCE_NAME: "BookStack"
          # Database configuration
          POSTGRES_DB: "test_db"
          POSTGRES_USER: "test_user"
          POSTGRES_PASSWORD: "test_password"
          POSTGRES_HOST: "localhost"
          POSTGRES_PORT: "5432"
          # JWT configuration
          JWT_SECRET_KEY: "test-secret-key-for-ci-only-not-for-production"
          JWT_ALGORITHM: "HS256"
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
          # Azure OpenAI configuration
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com/"
          AZURE_OPENAI_API_KEY: "test-azure-key"
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "text-embedding-3-large"
          AZURE_OPENAI_CHAT_DEPLOYMENT: "gpt-4"
          AZURE_OPENAI_API_VERSION: "2024-02-01"
          AZURE_OPENAI_AUTH_MODE: "api_key"

  # ---- Frontend ----
  frontend-test:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run --maxWorkers=1

      - name: Build
        run: npm run build

  # ---- Lint ----
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ---- Docker Build Smoke Test ----
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cleo-backend ./backend

      - name: Build frontend image
        run: docker build -t cleo-frontend ./frontend
