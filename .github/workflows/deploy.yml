name: Deploy CLEO Stack

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy
          - destroy
      deploy_target:
        description: "Services to deploy (use 'all' for first deploy)"
        required: false
        type: choice
        default: all
        options:
          - all
          - backend
          - frontend
      backend_version:
        description: "Backend version (e.g. v1.2.0 or latest)"
        required: false
        type: string
        default: latest
      frontend_version:
        description: "Frontend version (e.g. v1.3.0 or latest)"
        required: false
        type: string
        default: latest
      frontend_domain:
        description: "Frontend domain"
        required: false
        type: string
        default: cleo.andinolabs.ai
      backend_domain:
        description: "Backend domain"
        required: false
        type: string
        default: api.andinolabs.ai
      grafana_domain:
        description: "Grafana domain"
        required: false
        type: string
        default: grafana.andinolabs.ai

env:
  TF_WORKING_DIR: terraform/env/dev

# ─────────────────────────────────────────────
# JOB 1: validate
# ─────────────────────────────────────────────
jobs:
  validate:
    name: Validate Inputs & JSON
    runs-on: ubuntu-latest
    if: inputs.action == 'deploy'
    steps:
      - name: Validate GitHub variable JSON
        run: |
          echo "Validating BACKEND_ENV_JSON..."
          echo '${{ vars.BACKEND_ENV_JSON }}' | jq . > /dev/null || { echo "ERROR: BACKEND_ENV_JSON is not valid JSON"; exit 1; }
          echo "Validating FRONTEND_ENV_JSON..."
          echo '${{ vars.FRONTEND_ENV_JSON }}' | jq . > /dev/null || { echo "ERROR: FRONTEND_ENV_JSON is not valid JSON"; exit 1; }
          echo "JSON validation passed."

# ─────────────────────────────────────────────
# JOB 2: provision (terraform)
# ─────────────────────────────────────────────
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [validate]
    if: inputs.action == 'deploy' && needs.validate.result == 'success'
    outputs:
      vm_ip: ${{ steps.resolve_ip.outputs.vm_ip }}
      vm_exists: ${{ steps.vm_check.outputs.vm_exists }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.2'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Check VM existence
        id: vm_check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # Use state list to avoid capturing terraform warning text into VM_IP
          RESOURCE_COUNT=$(terraform state list 2>/dev/null | wc -l | tr -d ' ')
          if [ "$RESOURCE_COUNT" -gt "0" ]; then
            VM_IP=$(terraform output -raw vm_public_ip 2>/dev/null | head -1 | tr -d '[:space:]')
            echo "vm_exists=true" >> $GITHUB_OUTPUT
            echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT
            echo "VM already exists at $VM_IP"
          else
            echo "vm_exists=false" >> $GITHUB_OUTPUT
            echo "vm_ip=" >> $GITHUB_OUTPUT
            echo "VM does not exist yet"
          fi

      - name: Validate deploy_target for new VM
        if: steps.vm_check.outputs.vm_exists == 'false' && inputs.deploy_target != 'all'
        run: |
          echo "ERROR: deploy_target must be 'all' for the first deploy."
          exit 1

      - name: Terraform Plan
        if: steps.vm_check.outputs.vm_exists == 'false'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_postgres_db: ${{ secrets.POSTGRES_DB }}
          TF_VAR_postgres_user: ${{ secrets.POSTGRES_USER }}
        run: terraform plan -out=tfplan.binary

      - name: Convert plan to JSON
        if: steps.vm_check.outputs.vm_exists == 'false'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Install Trivy
        if: steps.vm_check.outputs.vm_exists == 'false'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Trivy Security Scan
        if: steps.vm_check.outputs.vm_exists == 'false'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: trivy config --exit-code 0 --severity HIGH,CRITICAL --format table tfplan.json

      - name: Terraform Apply
        id: apply
        if: steps.vm_check.outputs.vm_exists == 'false'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          TF_VAR_postgres_db: ${{ secrets.POSTGRES_DB }}
          TF_VAR_postgres_user: ${{ secrets.POSTGRES_USER }}
        run: |
          terraform apply -auto-approve tfplan.binary
          VM_IP=$(terraform output -raw vm_public_ip | tr -d '[:space:]')
          echo "vm_ip=$VM_IP" >> $GITHUB_OUTPUT

      - name: Save SSH key and DB secrets to GitHub
        if: steps.vm_check.outputs.vm_exists == 'false'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          VM_IP=$(terraform output -raw vm_public_ip | tr -d '[:space:]')
          SSH_KEY=$(terraform output -raw ssh_private_key)
          echo "::add-mask::$SSH_KEY"

          # Get repo public key for encryption
          REPO_KEY_RESPONSE=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/secrets/public-key")
          KEY_ID=$(echo "$REPO_KEY_RESPONSE" | jq -r '.key_id')
          REPO_PUBLIC_KEY=$(echo "$REPO_KEY_RESPONSE" | jq -r '.key')

          pip install PyNaCl -q

          encrypt_secret() {
            local VALUE="$1"
            python3 -c "
          import base64
          from nacl import public
          pk = base64.b64decode('$REPO_PUBLIC_KEY')
          box = public.SealedBox(public.PublicKey(pk))
          enc = box.encrypt('''$VALUE'''.encode())
          print(base64.b64encode(enc).decode())
          "
          }

          save_secret() {
            local NAME="$1"
            local ENCRYPTED="$2"
            curl -s -X PUT \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/secrets/$NAME" \
              -d "{\"encrypted_value\": \"$ENCRYPTED\", \"key_id\": \"$KEY_ID\"}"
            echo "Saved secret: $NAME"
          }

          save_secret "VM_SSH_PRIVATE_KEY" "$(encrypt_secret "$SSH_KEY")"
          save_secret "POSTGRES_HOST"      "$(encrypt_secret "$VM_IP")"
          save_secret "POSTGRES_DB"        "$(encrypt_secret "${{ secrets.POSTGRES_DB }}")"
          save_secret "POSTGRES_USER"      "$(encrypt_secret "${{ secrets.POSTGRES_USER }}")"
          save_secret "POSTGRES_PASSWORD"  "$(encrypt_secret "${{ secrets.POSTGRES_PASSWORD }}")"
          echo "All secrets saved"

      - name: Resolve final VM IP
        id: resolve_ip
        run: |
          if [ "${{ steps.vm_check.outputs.vm_exists }}" = "false" ]; then
            echo "vm_ip=${{ steps.apply.outputs.vm_ip }}" >> $GITHUB_OUTPUT
          else
            echo "vm_ip=${{ steps.vm_check.outputs.vm_ip }}" >> $GITHUB_OUTPUT
          fi

# ─────────────────────────────────────────────
# JOB 3: setup-vm (wait for cloud-init, sync repo)
# ─────────────────────────────────────────────
  setup-vm:
    name: Setup VM
    runs-on: ubuntu-latest
    needs: [provision]
    if: inputs.action == 'deploy'

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > /tmp/vm_key.pem
          chmod 600 /tmp/vm_key.pem

      - name: Wait for cloud-init
        if: needs.provision.outputs.vm_exists == 'false'
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"

          # Verify SSH key was written
          ls -la /tmp/vm_key.pem
          head -1 /tmp/vm_key.pem

          # Wait for port 22 to be reachable first
          echo "Waiting for SSH port 22 on $VM_IP..."
          for i in $(seq 1 20); do
            if nc -zw5 $VM_IP 22 2>/dev/null; then
              echo "Port 22 is open"
              break
            fi
            echo "Port 22 not open yet, attempt $i/20, waiting 15s..."
            sleep 15
          done

          # Now wait for cloud-init to complete
          echo "Waiting for cloud-init to complete on $VM_IP..."
          MAX=30
          for i in $(seq 1 $MAX); do
            echo "Attempt $i/$MAX..."
            SSH_OUT=$(ssh -i /tmp/vm_key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o BatchMode=yes \
              azureuser@$VM_IP \
              "test -f /var/log/cloud-init-complete.log && echo done || cloud-init status 2>/dev/null || echo waiting" 2>&1)
            echo "SSH response: $SSH_OUT"
            if echo "$SSH_OUT" | grep -q "done"; then
              echo "cloud-init complete"
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: Timed out waiting for cloud-init"
          # Print last SSH attempt error for debugging
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            azureuser@$VM_IP "journalctl -u cloud-init --no-pager -n 30" 2>&1 || true
          exit 1

      - name: Sync repository to VM
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP "
            if [ -d ~/cleo ]; then
              cd ~/cleo && git fetch origin && git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git ~/cleo
            fi
            echo 'Repo sync complete'
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/vm_key.pem

# ─────────────────────────────────────────────
# JOB 4a: deploy-backend
# JOB 4b: deploy-frontend
# (run in parallel after setup-vm)
# ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [provision, setup-vm]
    if: inputs.action == 'deploy' && (inputs.deploy_target == 'all' || inputs.deploy_target == 'backend')

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > /tmp/vm_key.pem
          chmod 600 /tmp/vm_key.pem

      - name: Inject backend .env
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          BACKEND_ENV_CONTENT=$(echo '${{ vars.BACKEND_ENV_JSON }}' | \
            jq --arg ip "$VM_IP" \
               --arg db "${{ secrets.POSTGRES_DB }}" \
               --arg user "${{ secrets.POSTGRES_USER }}" \
               --arg pass "${{ secrets.POSTGRES_PASSWORD }}" \
            '. + {POSTGRES_HOST: $ip, POSTGRES_DB: $db, POSTGRES_USER: $user, POSTGRES_PASSWORD: $pass}' | \
            jq -r 'to_entries[] | "\(.key)=\(.value)"')
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP "
            mkdir -p ~/cleo/backend
            cat > ~/cleo/backend/.env << 'ENVEOF'
          $BACKEND_ENV_CONTENT
          ENVEOF
            chmod 600 ~/cleo/backend/.env
            echo 'backend/.env written'
          "

      - name: Start all services (first deploy)
        if: needs.provision.outputs.vm_exists == 'false'
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP "
            cd ~/cleo
            docker compose -f docker-compose.observability.yml up --build -d
            echo 'All services started'
          "

      - name: Restart backend only (re-deploy)
        if: needs.provision.outputs.vm_exists == 'true'
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP "
            cd ~/cleo
            docker compose -f docker-compose.observability.yml up --build -d backend
            echo 'Backend restarted'
          "

      - name: Health check — backend
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          for i in $(seq 1 12); do
            if ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP \
                "curl -sf http://localhost:8000/health" 2>/dev/null; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 5s..."
            sleep 5
          done
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP \
            "cd ~/cleo && docker compose -f docker-compose.observability.yml logs backend --tail=50"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/vm_key.pem

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [provision, setup-vm]
    if: inputs.action == 'deploy' && (inputs.deploy_target == 'all' || inputs.deploy_target == 'frontend')

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > /tmp/vm_key.pem
          chmod 600 /tmp/vm_key.pem

      - name: Inject frontend .env
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          FRONTEND_ENV_CONTENT=$(echo '${{ vars.FRONTEND_ENV_JSON }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"')
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP "
            mkdir -p ~/cleo/frontend
            cat > ~/cleo/frontend/.env.local << 'ENVEOF'
          $FRONTEND_ENV_CONTENT
          ENVEOF
            chmod 600 ~/cleo/frontend/.env.local
            echo 'frontend/.env.local written'
          "

      - name: Restart frontend only (re-deploy)
        if: needs.provision.outputs.vm_exists == 'true'
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP "
            cd ~/cleo
            docker compose -f docker-compose.observability.yml up --build -d frontend
            echo 'Frontend restarted'
          "

      - name: Health check — frontend
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          for i in $(seq 1 12); do
            if ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP \
                "curl -sf http://localhost:3000" 2>/dev/null; then
              echo "Frontend reachable"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 5s..."
            sleep 5
          done
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP \
            "cd ~/cleo && docker compose -f docker-compose.observability.yml logs frontend --tail=50"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/vm_key.pem

# ─────────────────────────────────────────────
# JOB 5: configure-nginx (after both deploys)
# ─────────────────────────────────────────────
  configure-nginx:
    name: Configure NGINX
    runs-on: ubuntu-latest
    needs: [provision, deploy-backend, deploy-frontend]
    if: inputs.action == 'deploy' && inputs.deploy_target == 'all' && needs.provision.outputs.vm_exists == 'false'

    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > /tmp/vm_key.pem
          chmod 600 /tmp/vm_key.pem

      - name: Install and configure NGINX
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no azureuser@$VM_IP "
            which nginx || sudo apt-get install -y nginx
            sudo tee /etc/nginx/sites-available/cleo > /dev/null << 'NGINXEOF'
          server {
            listen 80;
            server_name ${{ inputs.frontend_domain }};
            location / {
              proxy_pass http://localhost:3000;
              proxy_http_version 1.1;
              proxy_set_header Upgrade \$http_upgrade;
              proxy_set_header Connection 'upgrade';
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
            }
          }
          server {
            listen 80;
            server_name ${{ inputs.backend_domain }};
            location / {
              proxy_pass http://localhost:8000;
              proxy_http_version 1.1;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
              proxy_buffering off;
            }
          }
          server {
            listen 80;
            server_name ${{ inputs.grafana_domain }};
            location / {
              proxy_pass http://localhost:3002;
              proxy_set_header Host \$host;
              proxy_set_header X-Real-IP \$remote_addr;
            }
          }
          NGINXEOF
            sudo ln -sf /etc/nginx/sites-available/cleo /etc/nginx/sites-enabled/cleo
            sudo nginx -t && sudo systemctl reload nginx
            echo 'NGINX configured'
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/vm_key.pem

# ─────────────────────────────────────────────
# JOB 6: summary
# ─────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [provision, deploy-backend, deploy-frontend, configure-nginx]
    if: |
      always() &&
      inputs.action == 'deploy' &&
      needs.provision.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      (needs.configure-nginx.result == 'success' || needs.configure-nginx.result == 'skipped')

    steps:
      - name: Write summary
        run: |
          VM_IP="${{ needs.provision.outputs.vm_ip }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Deployment Summary

          | Field | Value |
          |---|---|
          | Deploy Target | ${{ inputs.deploy_target }} |
          | VM Public IP | $VM_IP |
          | Backend Version | ${{ inputs.backend_version }} |
          | Frontend Version | ${{ inputs.frontend_version }} |

          ### DNS — point these A records to $VM_IP

          | Domain | Record |
          |---|---|
          | ${{ inputs.frontend_domain }} | A → $VM_IP |
          | ${{ inputs.backend_domain }} | A → $VM_IP |
          | ${{ inputs.grafana_domain }} | A → $VM_IP |
          EOF

# ─────────────────────────────────────────────
# JOB: destroy
# ─────────────────────────────────────────────
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: inputs.action == 'destroy'

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.12.2'
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: SSH app teardown
        continue-on-error: true
        run: |
          RESOURCE_COUNT=$(cd ${{ env.TF_WORKING_DIR }} && terraform state list 2>/dev/null | wc -l | tr -d ' ')
          if [ "$RESOURCE_COUNT" -gt "0" ]; then
            VM_IP=$(cd ${{ env.TF_WORKING_DIR }} && terraform output -raw vm_public_ip 2>/dev/null | head -1 | tr -d '[:space:]')
            echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > /tmp/vm_key.pem
            chmod 600 /tmp/vm_key.pem
            ssh -i /tmp/vm_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 azureuser@$VM_IP "
              cd ~/cleo 2>/dev/null || true
              docker compose -f docker-compose.observability.yml down --volumes --remove-orphans 2>/dev/null || true
              sudo rm -f /etc/nginx/sites-enabled/cleo /etc/nginx/sites-available/cleo
              sudo systemctl reload nginx 2>/dev/null || true
              echo 'App teardown complete'
            " || echo "WARNING: SSH teardown failed, continuing to terraform destroy"
            rm -f /tmp/vm_key.pem
          fi

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
        run: terraform destroy -auto-approve

      - name: Write destroy summary
        run: |
          echo "## Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "All CLEO infrastructure has been destroyed." >> $GITHUB_STEP_SUMMARY
