name: Terraform Destroy Existing Infra

on:
  push:
    branches:
      - feature/observability-setup
  workflow_dispatch:

env:
  TERRAFORM_VERSION: '1.12.2'
  WORKING_DIR: 'terraform/env/dev'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  destroy:
    name: Destroy Terraform Infrastructure
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Force Unlock State (if locked)
        run: |
          LOCK_OUTPUT=$(terraform plan 2>&1 || true)
          LOCK_ID=$(echo "$LOCK_OUTPUT" | grep -oP '(?<=ID:\s{8})[a-f0-9-]+' || true)
          if [ -n "$LOCK_ID" ]; then
            echo "Detected lock ID: $LOCK_ID — force unlocking..."
            terraform force-unlock -force "$LOCK_ID"
          else
            echo "No lock detected, continuing..."
          fi
        continue-on-error: true
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Check if infrastructure exists
        id: check
        run: |
          # Count resources in state — reliable way to check if anything exists
          RESOURCE_COUNT=$(terraform state list 2>/dev/null | wc -l | tr -d ' ')
          if [ "$RESOURCE_COUNT" -gt "0" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found $RESOURCE_COUNT resource(s) in state — will destroy"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No resources in state — nothing to destroy"
          fi

      - name: Terraform Destroy
        if: steps.check.outputs.exists == 'true'
        env:
          TF_VAR_postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
        run: terraform destroy -auto-approve

      - name: Write summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "## ✅ Infrastructure Destroyed" >> $GITHUB_STEP_SUMMARY
            echo "All Azure resources have been destroyed. Ready for fresh deploy." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ℹ️ Nothing to Destroy" >> $GITHUB_STEP_SUMMARY
            echo "No resources found in Terraform state — already clean." >> $GITHUB_STEP_SUMMARY
          fi
