name: Dev - Terraform Deploy with Trivy Scan

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
  workflow_dispatch:

env:
  TERRAFORM_VERSION: '1.12.2'
  WORKING_DIR: 'terraform/env/dev'

jobs:
  terraform:
    name: Scan & Deploy Terraform
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan to Binary
        id: plan
        run: terraform plan -out=tfplan.binary

      - name: Convert Plan to JSON
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy Scan on Terraform Plan
        id: trivy
        run: |
          echo "Running Trivy security scan on Terraform plan..."
          trivy config --exit-code 0 --severity HIGH,CRITICAL --format table tfplan.json
          echo "Trivy scan completed"

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.WORKING_DIR }}/tfplan.binary
            ${{ env.WORKING_DIR }}/tfplan.json
          retention-days: 5

      - name: Terraform Apply
        id: apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan.binary

      - name: Terraform Output
        id: output
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Infrastructure Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🖥️ VM Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Public IP:** $(terraform output -raw vm_public_ip)" >> $GITHUB_STEP_SUMMARY
          echo "- **SSH Command:** \`$(terraform output -raw ssh_command)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Grafana URL:** $(terraform output -raw grafana_url)" >> $GITHUB_STEP_SUMMARY
          echo "- **PostgreSQL:** $(terraform output -raw postgresql_connection)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Wait 3-5 minutes for cloud-init to complete installation" >> $GITHUB_STEP_SUMMARY
          echo "2. Save SSH private key: \`terraform output -raw ssh_private_key > vanguard_ssh_key.pem\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Set permissions: \`chmod 600 vanguard_ssh_key.pem\`" >> $GITHUB_STEP_SUMMARY
          echo "4. SSH into VM using the command above" >> $GITHUB_STEP_SUMMARY
          echo "5. Check installation status: \`cat /var/log/cloud-init-complete.log\`" >> $GITHUB_STEP_SUMMARY
          echo "6. Access Grafana at the provided URL (default credentials: admin/admin)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "Trivy security scan completed - Check logs above for any HIGH/CRITICAL findings" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with Plan and Security Scan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `## 🏗️ Terraform Plan & Security Scan
            
            #### Terraform Format Check 🖌️ \`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`
            #### Trivy Security Scan 🔒 \`${{ steps.trivy.outcome }}\`
            
            ### 📝 Summary
            - **Pusher:** @${{ github.actor }}
            - **Action:** ${{ github.event_name }}
            - **Working Directory:** \`${{ env.WORKING_DIR }}\`
            - **Terraform Version:** ${{ env.TERRAFORM_VERSION }}
            
            ### 🔐 Security Scan
            Trivy has scanned the Terraform plan for HIGH and CRITICAL security issues.
            Check the workflow logs for detailed results.
            
            ### ⚠️ Important Notes
            - Plan file has been generated and validated
            - Security scan completed successfully
            - Resources will be deployed to the **vanguard** Resource Group
            - VM will be provisioned with Docker, PostgreSQL, and Grafana
            
            ### 📦 Artifacts
            - Terraform plan binary and JSON are available as workflow artifacts
            - Download artifacts to review the complete plan
            
            ---
            
            *Merge this PR to \`main\` branch to automatically apply these changes.*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
