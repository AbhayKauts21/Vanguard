[pytest]
# Exclude scripts directory from test collection
norecursedirs = scripts __pycache__ .git .venv venv
testpaths = tests

# Asyncio mode
asyncio_mode = auto

# Verbose output by default
addopts = -v --tb=short

# Python files to test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
