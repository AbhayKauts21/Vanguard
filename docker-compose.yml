# CLEO — Docker Compose
# Usage: docker-compose up --build
# Requires: backend/.env and frontend/.env.local with valid API keys

services:
  backend:
    build: ./backend
    container_name: cleo-backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Build-time NEXT_PUBLIC_ vars are baked into the JS bundle.
        # For Docker, pass them here or copy .env.local before build.
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
        - NEXT_PUBLIC_ENABLE_STREAMING=true
        - NEXT_PUBLIC_ENABLE_AMBIENT_EFFECTS=true
    container_name: cleo-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    restart: unless-stopped
