apiVersion: 1

providers:
  # Dashboard provider for CLEO application
  - name: 'CLEO Dashboards'
    orgId: 1
    folder: 'CLEO'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
