# Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cleo'
    environment: 'production'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    scrape_interval: 10s

  # Scrape OpenTelemetry Collector exported metrics
  - job_name: 'otel-metrics'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 15s

  # Scrape Tempo metrics
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # Scrape Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Scrape backend services
  - job_name: 'cleo-backend'
    dns_sd_configs:
      - names:
          - 'backend'
        type: 'A'
        port: 8000
    metrics_path: '/metrics'
    scrape_interval: 30s

# Remote write configuration (for long-term storage)
# remote_write:
#   - url: http://cortex:9009/api/prom/push

# Remote read configuration
# remote_read:
#   - url: http://cortex:9009/api/prom/read
