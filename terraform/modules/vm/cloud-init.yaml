#cloud-config

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - wget
  - netcat-openbsd

runcmd:
  # Install Docker
  - echo "=== Installing Docker ==="
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ${admin_username}
  - docker --version

  # Install PostgreSQL (version-agnostic)
  - echo "=== Installing PostgreSQL ==="
  - apt-get install -y postgresql postgresql-contrib
  - systemctl enable postgresql
  - systemctl start postgresql
  - sleep 5
  - sudo -u postgres psql -c "ALTER USER postgres PASSWORD '${postgres_password}';"
  - sudo -u postgres psql -c "CREATE USER ${postgres_user} WITH PASSWORD '${postgres_password}';"
  - sudo -u postgres psql -c "CREATE DATABASE ${postgres_db} OWNER ${postgres_user};"
  - sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE ${postgres_db} TO ${postgres_user};"
  - PG_VERSION=$(pg_lsclusters -h | awk '{print $1}' | head -1)
  - PG_CONF_DIR="/etc/postgresql/$PG_VERSION/main"
  - echo "host all all 0.0.0.0/0 md5" >> $PG_CONF_DIR/pg_hba.conf
  - sed -i "s/#listen_addresses = 'localhost'/listen_addresses = '*'/g" $PG_CONF_DIR/postgresql.conf
  - systemctl restart postgresql
  - psql --version

  # Mark installation complete
  - echo "Docker and PostgreSQL installation completed at $(date)" > /var/log/cloud-init-complete.log
  - echo "=== Installation Complete ==="

final_message: "Vanguard VM provisioning completed successfully!"
